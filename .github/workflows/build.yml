name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # JDK 21 required to RUN Gradle (Metro gradle-plugin 1.1.1 needs JVM 21+);
          # the app still compiles to toolchain 17 via jvmToolchain(17).
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and lint
        run: ./gradlew assembleDebug lintDebug --no-daemon

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-reports
          path: '**/build/reports/lint-results-*.*'
          if-no-files-found: warn
