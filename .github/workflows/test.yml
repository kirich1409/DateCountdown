name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # JDK 21 required to RUN Gradle (Metro gradle-plugin 1.1.1 needs JVM 21+);
          # the app still compiles to toolchain 17 via jvmToolchain(17).
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest :domain:test --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'
          if-no-files-found: warn

      - name: Test summary
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: '**/build/test-results/**/*.xml'
          include_passed: true
