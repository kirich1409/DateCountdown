## DateCountdown detekt configuration.
## Built on top of detekt's default config (buildUponDefaultConfig = true).
## Compose rules come from io.nlopez.compose.rules:detekt (registered via detektPlugins).

naming:
  FunctionNaming:
    # PascalCase is the Compose convention for @Composable functions. Without this exclusion,
    # detekt flags every top-level composable under the FunctionNaming rule.
    ignoreAnnotated:
      - 'Composable'

style:
  MagicNumber:
    # Hex color literals inside @Composable bodies (e.g. Color(0xFF…)) are idiomatic Compose;
    # flagging them as magic numbers produces only noise.
    ignoreAnnotated:
      - 'Composable'

Compose:
  active: true
  ComposableNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  ComposableParamOrder:
    active: true
  PreviewPublic:
    active: true
  RememberMissing:
    active: true
  UnstableCollections:
    active: false
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
